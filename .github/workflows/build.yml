name: Build latest linux-xanmod-rt Kernel

on:
  schedule:
    # 每周一 UTC 0:00 自动检查并编译最新版
    - cron: '0 0 * * 1'
  workflow_dispatch: # 允许手动触发

jobs:
  build-kernel:
    name: Build latest xanmod-rt
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4

    - name: 2. Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev \
                               bc cpio kmod rsync wget xz-utils patch git curl jq

    - name: 3. Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-kernel-ccache-xanmod-rt
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: 4. Clone XanMod-RT Branch from GitLab
      run: |
        # 直接克隆 GitLab 上的 6.18-rt 分支（最新源码）
        git clone --depth 1 --branch 6.18-rt https://gitlab.com/xanmod/linux.git linux-xanmod-rt

    - name: 5. Apply Custom Version (-rt-innuos-02) - Force Override
      working-directory: linux-xanmod-rt
      run: |
        # 生成默认配置
        make defconfig
        
        # === 完全替换 LOCALVERSION（核心步骤）===
        # 1. 强制设置 CONFIG_LOCALVERSION 为 "-rt-innuos-02"（覆盖源码原有值）
        sed -i 's/^CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-rt-innuos-02"/' .config
        
        # 2. 禁用自动追加版本号（防止 Git 哈希干扰）
        sed -i 's/^CONFIG_LOCALVERSION_AUTO=.*/# CONFIG_LOCALVERSION_AUTO is not set/' .config
        
        # 3. 删除源码中所有 localversion* 文件（彻底清除 XanMod 自带的后缀）
        rm -f localversion*
        
        # 4. 启用 ccache 加速编译
        sed -i 's/^# CONFIG_CCACHE is not set/CONFIG_CCACHE=y/' .config
        
        # === 验证配置 ===
        echo "--- Final .config LOCALVERSION settings ---"
        grep "LOCALVERSION" .config
        
        echo "--- Expected Kernel Release Name ---"
        make kernelrelease

    - name: 6. Compile Kernel
      working-directory: linux-xanmod-rt
      run: |
        # 设置 ccache 参数
        export CCACHE_DIR=$HOME/.ccache
        export CCACHE_MAXSIZE=4G
        ccache -z
        
        # 开始编译（仅核心与模块，跳过打包以节省时间）
        make -j$(nproc) bzImage modules
        
        # 显示 ccache 统计信息
        ccache -s

    - name: 7. Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-xanmod-rt-6.18.29-rt-innuos-02
        path: |
          linux-xanmod-rt/arch/x86/boot/bzImage
          linux-xanmod-rt/vmlinux
