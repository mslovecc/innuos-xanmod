name: Build latest linux-xanmod-rt Kernel

on:
  schedule:
    # 每周一 UTC 0:00 自动检查并编译最新版
    - cron: '0 0 * * 1'
  workflow_dispatch: # 允许手动触发

jobs:
  build-kernel:
    name: Build latest xanmod-rt
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4

    - name: 2. Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev \
                               bc cpio kmod rsync wget xz-utils patch git curl jq

    - name: 3. Get Latest XanMod-RT Tag
      id: get_tag
      run: |
        # 使用 GitHub API 获取 xanmod/linux 的所有标签，过滤出 rt 分支的标签，并取最新的一条
        LATEST_TAG=$(curl -s "https://api.github.com/repos/xanmod/linux/tags" | jq -r '.[] | .name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-rt[0-9]+-xanmod[0-9]+$' | head -n 1)
        
        if [ -z "$LATEST_TAG" ]; then
          echo "Error: Could not fetch the latest xanmod-rt tag."
          exit 1
        fi
        
        echo "Latest Tag: $LATEST_TAG"
        echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: 4. Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-kernel-ccache-${{ steps.get_tag.outputs.tag }}
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: 5. Clone Specific Tag Source
      run: |
        git clone --depth 1 --branch ${{ steps.get_tag.outputs.tag }} https://github.com/xanmod/linux.git linux-xanmod-rt

    - name: 6. Apply Custom Version (-innuos-02)
      working-directory: linux-xanmod-rt
      run: |
        # 生成默认配置 (如果你有自己定制的 config，可以在这里替换)
        make defconfig
        
        # 注入自定义后缀
        sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-innuos-02"/' .config
        sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' .config
        
        # 启用 ccache 加速
        sed -i 's/# CONFIG_CCACHE is not set/CONFIG_CCACHE=y/' .config
        
        grep "CONFIG_LOCALVERSION" .config
        grep "CONFIG_CCACHE" .config

    - name: 7. Compile Kernel
      working-directory: linux-xanmod-rt
      run: |
        # 设置 ccache 参数
        export CCACHE_DIR=$HOME/.ccache
        export CCACHE_MAXSIZE=4G
        ccache -z
        
        # 开始编译 (仅编译核心与模块，跳过 deb 打包以节省时间)
        make -j$(nproc) bzImage modules
        
        # 显示 ccache 统计信息
        ccache -s

    - name: 8. Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-xanmod-rt-${{ steps.get_tag.outputs.tag }}-innuos-02
        path: |
          linux-xanmod-rt/arch/x86/boot/bzImage
          linux-xanmod-rt/vmlinux
