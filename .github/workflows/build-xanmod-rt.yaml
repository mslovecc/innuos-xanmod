name: Build XanMod 6.18-rt Kernel (DEB packages)

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 UTC 0:00
  workflow_dispatch:

jobs:
  build:
    name: Build and package XanMod 6.18-rt
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install all build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            bc \
            bison \
            build-essential \
            ccache \
            cpio \
            curl \
            debhelper \
            devscripts \
            dkms \
            dwarves \
            fakeroot \
            flex \
            gawk \
            git \
            kernel-wedge \
            libcap-dev \
            libelf-dev \
            libiberty-dev \
            libncurses-dev \
            libpci-dev \
            libssl-dev \
            libudev-dev \
            openssl \
            python3 \
            rsync \
            wget \
            xz-utils \
            zstd
          # 额外确保所有 Linux 内核构建依赖已安装
          sudo apt-get build-dep -y linux

      - name: 3. Set up ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-xanmod-6.18-rt-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-xanmod-6.18-rt-
            ${{ runner.os }}-ccache-

      - name: 4. Clone XanMod kernel source (6.18-rt branch)
        run: |
          git clone --depth 1 --branch 6.18-rt https://gitlab.com/xanmod/linux.git linux-xanmod-rt
          echo "KERNEL_SOURCE_DIR=$(pwd)/linux-xanmod-rt" >> $GITHUB_ENV

      - name: 5. Configure kernel and set custom localversion
        working-directory: linux-xanmod-rt
        run: |
          make defconfig
          ./scripts/config --set-str CONFIG_LOCALVERSION "-rt-innuos-02"
          ./scripts/config --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --enable CONFIG_PREEMPT
          ./scripts/config --enable CONFIG_PREEMPT_RT
          make olddefconfig
          echo "KERNEL_RELEASE=$(make kernelrelease)" >> $GITHUB_ENV
          echo "Kernel release will be: $(make kernelrelease)"

      - name: 6. Build kernel and generate .deb packages
        working-directory: linux-xanmod-rt
        env:
          CCACHE_DIR: ~/.ccache
          CCACHE_MAXSIZE: 5G
        run: |
          ccache -z
          # 使用 deb-pkg 目标直接生成 .deb 包（包含内核、头文件、调试符号等）
          make -j$(nproc) deb-pkg
          ccache -s

      - name: 7. Collect .deb packages
        run: |
          # make deb-pkg 会在源码目录的上一级生成 .deb 文件
          mkdir -p artifacts
          # 复制所有生成的 .deb 文件（包括 linux-image, linux-headers, linux-libc-dev 等）
          cp ../*.deb artifacts/ || true
          # 也可能生成 .dsc 和 .changes，一并复制
          cp ../*.dsc ../*.changes artifacts/ || true
          # 列出文件以供调试
          ls -la artifacts/

      - name: 8. Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.KERNEL_RELEASE }}-deb
          path: artifacts/
          retention-days: 7
