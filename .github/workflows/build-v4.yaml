name: Build XanMod 6.18-rt Kernel (v4)

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and package XanMod 6.18-rt
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install all build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf bc bison build-essential ccache cpio curl \
            debhelper devscripts dkms dwarves fakeroot flex gawk git \
            kernel-wedge libcap-dev libdw-dev libelf-dev libiberty-dev \
            libncurses-dev libpci-dev libssl-dev libudev-dev openssl \
            python3 rsync wget xz-utils zstd

      - name: 3. Set up ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-xanmod-6.18-rt-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-xanmod-6.18-rt-
            ${{ runner.os }}-ccache-

      - name: 4. Clone XanMod kernel source (6.18-rt branch)
        run: |
          git clone --depth 1 --branch 6.18-rt https://gitlab.com/xanmod/linux.git linux-xanmod-rt
          echo "KERNEL_SOURCE_DIR=$(pwd)/linux-xanmod-rt" >> $GITHUB_ENV

      - name: 5. Configure kernel and completely override version
        working-directory: linux-xanmod-rt
        run: |
          # ===== 关键步骤：彻底清除 XanMod 版本标记 =====
          # 1. 删除所有 localversion 文件
          rm -f localversion* || true
          
          # 2. 删除 debian/changelog 中的版本信息（防止影响打包）
          rm -f debian/changelog || true
          
          # 3. 创建一个空的 localversion 文件
          touch localversion
          
          # 4. 生成并修改配置
          make defconfig
          ./scripts/config --set-str CONFIG_LOCALVERSION "-rt-innuos-02"
          ./scripts/config --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --enable CONFIG_PREEMPT
          ./scripts/config --enable CONFIG_PREEMPT_RT
          make olddefconfig
          
          # 5. 手动创建 debian/changelog（防止 make deb-pkg 自动生成带 xanmod 的版本）
          cat > debian/changelog << 'EOF'
          linux-upstream (6.18.38-rt-innuos-02-1) noble; urgency=medium
          
            * Custom XanMod 6.18-rt kernel with PREEMPT_RT
          
           -- runner <runner@localhost>  $(date -R)
          EOF
          
          # 6. 验证最终版本号
          echo "KERNEL_RELEASE=$(make kernelrelease)" >> $GITHUB_ENV
          echo "Kernel release will be: $(make kernelrelease)"

      - name: 6. Build kernel and generate .deb packages
        working-directory: linux-xanmod-rt
        env:
          CCACHE_DIR: ~/.ccache
          CCACHE_MAXSIZE: 5G
        run: |
          ccache -z
          # 使用 -d 强制使用我们创建的 changelog
          make -j$(nproc) deb-pkg
          ccache -s

      - name: 7. Rename .deb packages (remove -xanmod1 if present)
        run: |
          mkdir -p artifacts
          find . .. -maxdepth 2 -name "*.deb" -exec cp {} artifacts/ \;
          cd artifacts
          # 批量重命名：将 -xanmod1 替换为空（仅当存在时）
          for f in *.deb; do
            newname=$(echo "$f" | sed 's/-xanmod1//g')
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
              echo "Renamed: $f -> $newname"
            fi
          done
          echo "Final artifacts:"
          ls -la

      - name: 8. Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.KERNEL_RELEASE }}-deb
          path: artifacts/
          retention-days: 7

      - name: 9. Create GitHub Release and upload .deb packages
        uses: softprops/action-gh-release@v2
        with:
          name: "Kernel ${{ env.KERNEL_RELEASE }}"
          tag_name: "v${{ env.KERNEL_RELEASE }}"
          files: artifacts/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
